<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget de Localização IRL - Prism Live</title>
    <style>
        /* Estilos globais */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: transparent; /* Fundo transparente para overlay */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do widget */
        #location-widget {
            background: rgba(0, 0, 0, 0.85);
            color: #FFD700; /* Texto dourado */
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Ícone de localização */
        #location-icon {
            font-size: 2em;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        /* Animação de pulso */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Estados visuais */
        .state-loading {
            opacity: 0.7;
        }

        .state-locating {
            opacity: 0.8;
        }

        .state-displaying {
            opacity: 1;
        }

        .state-error {
            border-color: #FF4500;
            color: #FF4500;
        }

        .state-reconnecting {
            opacity: 0.6;
        }

        /* Texto de status */
        #status {
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        /* Informações de localização */
        #location-info {
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Última atualização */
        #last-update {
            font-size: 0.8em;
            color: rgba(255, 215, 0, 0.7);
            margin-top: 10px;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            #location-widget {
                padding: 15px;
                max-width: 90%;
            }
            #location-icon {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div id="location-widget" class="state-loading">
        <div id="location-icon">📍</div>
        <div id="status">Carregando...</div>
        <div id="location-info"></div>
        <div id="last-update"></div>
    </div>

    <script>
        // Variáveis globais
        let lastUpdate = null;
        let updateInterval = null;
        let retryCount = 0;
        const maxRetries = 3;
        const updateFrequency = 60000; // 60 segundos

        // Função principal para obter localização
        async function getLocation() {
            const widget = document.getElementById('location-widget');
            const status = document.getElementById('status');
            const info = document.getElementById('location-info');
            const lastUpdateDiv = document.getElementById('last-update');

            // Estado inicial: localizando
            widget.className = 'state-locating';
            status.textContent = 'Obtendo localização...';
            info.textContent = '';

            try {
                // Tentar GPS primeiro
                const position = await getGPSLocation();
                const { latitude, longitude } = position.coords;
                await displayLocation(latitude, longitude, 'GPS');
            } catch (error) {
                console.warn('GPS falhou, tentando IP geolocation:', error);
                try {
                    // Fallback para IP geolocation
                    const ipData = await getIPLocation();
                    const { latitude, longitude } = ipData;
                    await displayLocation(latitude, longitude, 'IP');
                } catch (ipError) {
                    console.error('IP geolocation também falhou:', ipError);
                    handleError('Erro ao obter localização. Tentando novamente...');
                    if (retryCount < maxRetries) {
                        retryCount++;
                        setTimeout(getLocation, 5000); // Retry em 5 segundos
                    } else {
                        status.textContent = 'Falha permanente. Verifique permissões.';
                    }
                }
            }
        }

        // Obter localização via GPS
        function getGPSLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocalização não suportada'));
                } else {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000 // 5 minutos
                    });
                }
            });
        }

        // Obter localização via IP (ipwho.is)
        async function getIPLocation() {
            const response = await fetch('https://ipwho.is/');
            if (!response.ok) throw new Error('Erro na API IP');
            const data = await response.json();
            if (!data.success) throw new Error('Dados IP inválidos');
            return { latitude: data.latitude, longitude: data.longitude };
        }

        // Reverse geocoding via Nominatim
        async function reverseGeocode(lat, lon) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('Erro no reverse geocoding');
            const data = await response.json();
            return data;
        }

        // Exibir localização
        async function displayLocation(lat, lon, source) {
            const widget = document.getElementById('location-widget');
            const status = document.getElementById('status');
            const info = document.getElementById('location-info');
            const lastUpdateDiv = document.getElementById('last-update');

            try {
                const geoData = await reverseGeocode(lat, lon);
                const neighborhood = geoData.address?.suburb || geoData.address?.neighbourhood || 'Desconhecido';
                const city = geoData.address?.city || geoData.address?.town || geoData.address?.village || 'Desconhecida';
                const coords = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;

                widget.className = 'state-displaying';
                status.textContent = `Fonte: ${source}`;
                info.innerHTML = `<strong>Bairro:</strong> ${neighborhood}<br><strong>Cidade:</strong> ${city}<br><strong>Coordenadas:</strong> ${coords}`;
                lastUpdate = new Date();
                updateLastUpdateTime();
                retryCount = 0; // Reset retry
            } catch (error) {
                console.error('Erro no reverse geocoding:', error);
                handleError('Erro ao processar localização.');
            }
        }

        // Manipular erros
        function handleError(message) {
            const widget = document.getElementById('location-widget');
            const status = document.getElementById('status');
            widget.className = 'state-error';
            status.textContent = message;
        }

        // Atualizar tempo da última atualização
        function updateLastUpdateTime() {
            const lastUpdateDiv = document.getElementById('last-update');
            if (lastUpdate) {
                const now = new Date();
                const diff = Math.floor((now - lastUpdate) / 1000);
                lastUpdateDiv.textContent = `Última atualização: há ${diff} segundos`;
            }
        }

        // Iniciar atualização automática
        function startAutoUpdate() {
            updateInterval = setInterval(() => {
                const widget = document.getElementById('location-widget');
                widget.className = 'state-reconnecting';
                document.getElementById('status').textContent = 'Atualizando...';
                getLocation();
            }, updateFrequency);
        }

        // Atualizar contador de tempo a cada segundo
        setInterval(updateLastUpdateTime, 1000);

        // Iniciar tudo
        getLocation();
        startAutoUpdate();
    </script>
</body>
</html>
